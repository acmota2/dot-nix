# General appearance
bordercolor=0x333333aa
borderpx=2
default_mfact=0.5
default_nmaster=1
focuscolor=0x007184ee
gappih=3
gappiv=3
gappoh=10
gappov=3
new_is_master=0
rootcolor=0x007184ee
smartgaps=0
urgentcolor=0xad401fff

# Keep only tag/workspace transition animation
animations=1
layer_animations=0

# Use slide animation
animation_type_open=slide
animation_type_close=slide

# Keep everything fast
animation_duration_open=120
animation_duration_close=120

animation_duration_move=0
animation_duration_focus=0

# Keep workspace/tag animation slightly slower
animation_duration_tag=180
animation_curve_tag=0.46,1.0,0.29,0.99

# Tearing
allow_tearing=0

# Input
xkb_rules_layout=us
xkb_rules_variant=intl
repeat_rate=25
repeat_delay=300
trackpad_natural_scrolling=0

# Window rules
windowrule=isfloating:1,appid:xdg-desktop-portal-gtk
windowrule=focused_opacity:0.9,unfocused_opacity:0.8,appid:footclient

# Startup
exec-once=waybar
exec-once=mako
exec-once=blueman-applet
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=foot --server
exec-once=swayosd-server

# Layout switching
bind=SUPER,F1,setlayout,tile
bind=SUPER,F2,setlayout,scroller
bind=SUPER,F3,setlayout,monocle
bind=SUPER,F4,setlayout,grid
bind=SUPER,F5,switch_layout

# Monitor switching
bind=SUPER+CTRL,left,focusmon,left
bind=SUPER+CTRL,right,focusmon,right

bind=SUPER+CTRL+SHIFT,left,tagmon,left,1
bind=SUPER+CTRL+SHIFT,right,tagmon,right,1

# Launcher / session
bind=SUPER,Return,spawn,footclient
bind=SUPER,D,spawn,wofi -S drun,run
bind=SUPER+SHIFT,D,spawn,walker
bind=SUPER,V,spawn_shell,cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind=SUPER,E,spawn,wofi-emoji
bind=SUPER,P,spawn,wofi-power-menu
bindl=SUPER,L,spawn,swaylock
bind=SUPER+SHIFT,C,quit
bind=SUPER+SHIFT,Q,killclient

# Focus movement
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down

# Move windows
bind=SUPER+SHIFT,left,exchange_client,left
bind=SUPER+SHIFT,right,exchange_client,right
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,down,exchange_client,down

# Resize
bind=ALT+SHIFT,right,resizewin,+25,0
bind=ALT+SHIFT,up,resizewin,0,-25
bind=ALT+SHIFT,down,resizewin,0,+25
bind=ALT+SHIFT,left,resizewin,-25,0

# Window state
bind=SUPER,F,togglefullscreen
bind=SUPER,A,togglefloating

# Tags
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# Mouse wheel tag switching
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Mouse move / resize
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Screenshots
bind=SUPER,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy
bind=NONE,Print,spawn_shell,grim -o "$(slurp -o | head -n1)" - | wl-copy
bind=SUPER+SHIFT,Print,spawn_shell,grim -g "$(slurp)" - | wl-copy

# Brightness / audio with SwayOSD
bind=NONE,XF86MonBrightnessUp,spawn,swayosd-client --brightness raise
bind=SHIFT,XF86MonBrightnessUp,spawn,swayosd-client --brightness +100
bind=NONE,XF86MonBrightnessDown,spawn,swayosd-client --brightness lower
bind=SHIFT,XF86MonBrightnessDown,spawn,swayosd-client --brightness 1
bind=NONE,XF86AudioRaiseVolume,spawn,swayosd-client --output-volume raise
bind=NONE,XF86AudioLowerVolume,spawn,swayosd-client --output-volume lower
bind=NONE,XF86AudioMute,spawn,swayosd-client --output-volume mute-toggle
bind=SHIFT,XF86AudioMute,spawn,swayosd-client --input-volume mute-toggle
