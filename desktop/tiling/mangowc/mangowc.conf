# Core apps
terminal=footclient
menu=wofi -S drun,run

# General appearance
border_px=1
gappih=3
gappiv=3
gappoh=10
gappov=10
smartgaps=0
monoclegaps=0

# No rounded windows
cornerradius=0

# Tearing
allow_tearing=0

# Input
xkb_rule_names=us,us,,lv3:menu_switch,intl,
repeat_rate=25
repeat_delay=300
natural_scrolling=0

# Monitors
# Warning: avoid negative coordinates with XWayland apps.
monitorrule=name:^DP-1$,width:2560,height:1440,refresh:180,x:810,y:0,scale:1,vrr:1,rr:0
monitorrule=name:^DP-2$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1.33,vrr:0,rr:1

# Window rules
windowrule=float:1,appid:xdg-desktop-portal-gtk
windowrule=opacity:0.9:0.8,appid:footclient
windowrule=stayfocused:1,title:^$,appid:steam

# Startup
exec-once=waybar
exec-once=mako
exec-once=blueman-applet
exec-once=wl-paste --type text --watch cliphist store
exec-once=wl-paste --type image --watch cliphist store
exec-once=foot --server

# Launcher / session
bind=SUPER,Return,spawn,footclient
bind=SUPER,D,spawn,wofi -S drun,run
bind=SUPER,Shift,D,spawn,walker
bind=SUPER,V,spawn,sh -c "cliphist list | wofi --dmenu | cliphist decode | wl-copy"
bind=SUPER,E,spawn,wofi-emoji
bind=SUPER,P,spawn,wofi-power-menu
bind=SUPER,L,spawn,swaylock
bind=SUPER,Shift,C,quit
bind=SUPER,Shift,Q,killclient

# Focus movement
bind=SUPER,left,focusdir,l
bind=SUPER,right,focusdir,r
bind=SUPER,up,focusdir,u
bind=SUPER,down,focusdir,d

# Move windows
bind=SUPER,Shift,left,movewin,l
bind=SUPER,Shift,right,movewin,r
bind=SUPER,Shift,up,movewin,u
bind=SUPER,Shift,down,movewin,d

# Resize
bind=Alt+Shift,right,resizewin,25,0
bind=Alt+Shift,up,resizewin,0,-25
bind=Alt+Shift,down,resizewin,0,25
bind=Alt+Shift,left,resizewin,-25,0

# Window state
bind=SUPER,F,togglefullscreen
bind=SUPER,A,togglefloating

# Tags
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+Shift,1,tag,1
bind=SUPER+Shift,2,tag,2
bind=SUPER+Shift,3,tag,3
bind=SUPER+Shift,4,tag,4
bind=SUPER+Shift,5,tag,5
bind=SUPER+Shift,6,tag,6
bind=SUPER+Shift,7,tag,7
bind=SUPER+Shift,8,tag,8
bind=SUPER+Shift,9,tag,9

# Mouse wheel tag switching
bind=SUPER,mouse_down,viewnext
bind=SUPER,mouse_up,viewprev

# Mouse move / resize
bindm=SUPER,mouse:272,movemouse
bindm=SUPER,mouse:273,resizemouse

# Screenshots
bind=SUPER,Print,spawn,sh -c 'grim -g "$(slurp)" - | wl-copy'
bind=,Print,spawn,sh -c 'grim -o "$(slurp -o | head -n1)" - | wl-copy'
bind=SUPER+Shift,Print,spawn,sh -c 'grim -g "$(slurp)" - | wl-copy'

# Brightness / audio
bind=,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=,XF86MonBrightnessDown,spawn,brightnessctl set 5%-
bind=,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bind=,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bind=,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
