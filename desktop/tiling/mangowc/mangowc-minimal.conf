# Basic appearance
default_layout=tile
allow_tearing=0

# Input
xkb_rules_layout=us
xkb_rules_variant=intl
repeat_rate=25
repeat_delay=300
trackpad_natural_scrolling=0

# Focus rules
windowrule=isfloating:1,appid:firefox
windowrule=isfullscreen:1,appid:firefox

# Startup
exec-once=foot --server
exec-once=steam -gamepadui

# Minimal launcher / fallback
bind=SUPER,Return,spawn,footclient
bind=SUPER,D,spawn,wofi -S drun,run

# Emergency / window state
bind=SUPER,F,togglefullscreen
bind=SUPER,A,togglefloating
bind=SUPER+SHIFT,Q,killclient
bind=SUPER+SHIFT,C,quit

# Focus movement
bind=SUPER,left,focusdir,left
bind=SUPER,right,focusdir,right
bind=SUPER,up,focusdir,up
bind=SUPER,down,focusdir,down

# Audio
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 2%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 2%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle
